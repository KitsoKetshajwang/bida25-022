 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback – Daily Grind Cafe</title>
  <link rel="shortcut icon" href="./images/icon.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">
      <a href="index.html">
        <img src="./images/logo.png" alt="Daily Grind Cafe Logo">
      </a>
    </div>
    <nav class="nav">
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="aboutus.html">ABOUT US</a></li>
        <li><a href="menu.html">MENU</a></li>
        <li><a href="order.html">ORDER</a></li>
        <li><a href="testimonials.html">TESTIMONIALS</a></li>
        <li><a href="feedback.html" class="active">FEEDBACK</a></li>
      </ul>
    </nav>
    <button class="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="drawer-overlay"></div>
  <nav class="nav-drawer">
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="aboutus.html">ABOUT US</a></li>
      <li><a href="menu.html">MENU</a></li>
      <li><a href="order.html">ORDER</a></li>
      <li><a href="testimonials.html">TESTIMONIALS</a></li>
      <li><a href="feedback.html" class="active">FEEDBACK</a></li>
    </ul>
  </nav>

  <main>
    <section class="feedback-section">
      <h1>Feedback</h1>
      <p class="subtitle">We'd love to hear from you!</p>

      <div class="feedback-form-wrapper">
        <form action="acknowledgement.html" method="GET">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Feedback</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Daily Grind Cafe. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    (function () {
      var hamburger = document.querySelector('.hamburger');
      var drawer    = document.querySelector('.nav-drawer');
      var overlay   = document.querySelector('.drawer-overlay');
      if (!hamburger) return;
      function openNav()  { drawer.classList.add('open'); overlay.classList.add('open'); hamburger.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function closeNav() { drawer.classList.remove('open'); overlay.classList.remove('open'); hamburger.classList.remove('open'); document.body.style.overflow = ''; }
      hamburger.addEventListener('click', function () { drawer.classList.contains('open') ? closeNav() : openNav(); });
      overlay.addEventListener('click', closeNav);
      document.querySelectorAll('.nav-drawer a').forEach(function (l) { l.addEventListener('click', closeNav); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeNav(); });
    })();
  </script>

</body>
</html>
